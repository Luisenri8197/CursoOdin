<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main class="parent"><p>Padre</p>
  <div class="child group1"><p>Hijo Grupo1</p>
    <div class="grand-child group1"><p>Nieto Grupo1</p></div>
  </div>
  <div class="child group2"><p>Hijo Grupo2</p>
    <div class="grand-child group2"><p>Nieto Grupo2</p></div>
  </div>
  <div class="child group3"><p>Hijo Grupo3</p>
    <div class="grand-child group3"><p>Nieto Grupo3</p></div>
  </div>
</main>

<select name="fashion">
  <optgroup label="Clothing">
    <option value="t_shirt">T-Shirts</option>
    <option value="sweater">Sweaters</option>
    <option value="coats">Coats</option>
  </optgroup>
  <optgroup label="Foot Wear">
    <option value="sneakers">Sneakers</option>
    <option value="boots">Boots</option>
    <option value="sandals">Sandals</option>
  </optgroup>
</select>

<fieldset>
  <legend>Selecciona tu color favorito</legend>
  <label><input type="radio" name="color" value="rojo"> Rojo</label>
  <label><input type="radio" name="color" value="azul"> Azul</label>
  <label><input type="radio" name="color" value="verde"> Verde</label>
</fieldset>

</body>
</html>
