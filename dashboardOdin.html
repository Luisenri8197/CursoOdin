<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styleDashboard.css">
    <link rel="stylesheet" href="https://unpkg.com/@fortawesome/fontawesome-free@7.3.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="top-browser">
            <div class="search-bar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M544 513L397.2 364.2C417.2 336.3 429.1 302 429.1 265C429.1 171.9 354.4 96.1 262.6 96.1C170.7 96 96 171.8 96 264.9C96 358 170.7 433.8 262.5 433.8C302.3 433.8 338.8 419.6 367.5 395.9L513.5 544L544 513zM262.5 394.8C191.9 394.8 134.4 336.5 134.4 264.9C134.4 193.3 191.9 135 262.5 135C333.1 135 390.6 193.3 390.6 264.9C390.6 336.5 333.2 394.8 262.5 394.8z"/></svg>
                <input type="search" id="site-search" name="q" placeholder="Search...">
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.3.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M320 64C306.7 64 296 74.7 296 88L296 97.7C214.6 109.3 152 179.4 152 264L152 278.5C152 316.2 142 353.2 123 385.8L101.1 423.2C97.8 429 96 435.5 96 442.2C96 463.1 112.9 480 133.8 480L506.2 480C527.1 480 544 463.1 544 442.2C544 435.5 542.2 428.9 538.9 423.2L517 385.7C498 353.1 488 316.1 488 278.4L488 263.9C488 179.3 425.4 109.2 344 97.6L344 87.9C344 74.6 333.3 63.9 320 63.9zM488.4 432L151.5 432L164.4 409.9C187.7 370 200 324.6 200 278.5L200 264C200 197.7 253.7 144 320 144C386.3 144 440 197.7 440 264L440 278.5C440 324.7 452.3 370 475.5 409.9L488.4 432zM252.1 528C262 556 288.7 576 320 576C351.3 576 378 556 387.9 528L252.1 528z"/></svg>
            <a href="#"><img src="examplestyle/Logo-Dashboard.png" alt="logo ejemplo"></a>
            <a href="#" class="name-browser">Luis E Ordonez</a>
        </div>
        <nav class="welcome-nav">
            <ul>
                <li><div class="logo-nav">
                    <img src="examplestyle/Logo-Dashboard.png" alt="logo ejemplo">
                    <p class="little-nav-hi">hi there</p>
                    <p class="big-name">Luis Ordonez (<a href="#">@luis</a>)</p>
                </div></li>
                <li class="tarjeta-wellcome">New</li>
                <li class="tarjeta-wellcome">Upload</li>
                <li class="tarjeta-wellcome">Share</li>
            </ul>
        </nav>
    </header>
    <aside>
        <div class="title-aside">
            <img src="examplestyle/Logo-Dashboard.png" alt="Logo Dashboard">
            <h2>Dashboard</h2>
        </div>
        <div class="mid-aside">
            <ul>
                <li class="mid-aside li-home"><i class="fa-regular fa-house"></i> Home</li>
                <li class="mid-aside li-profile"><i class="fa-regular fa-address-card"></i> Profile</li>
                <li class="mid-aside li-messages"><i class="fa-regular fa-message"></i> Messages</li>
                <li class="mid-aside li-history"><i class="fa-regular fa-clock"></i> History</li>
                <li class="mid-aside li-task"><i class="fa-regular fa-copy"></i> Task</li>
                <li class="mid-aside li-community"><i class="fa-solid fa-people-group"></i> Community</li>
            </ul>
        </div>
        <div class="bottom-aside">
            <ul>
                <li class="bottom-aside li-settings"><i class="fa-solid fa-gear"></i> Settings</li>
                <li class="bottom-aside li-support"><i class="fa-regular fa-circle-question"></i> Support</li>
                <li class="bottom-aside li-privacy"><i class="fa-solid fa-lock"></i> Privacy</li>
            </ul>
        </div>
    </aside>
    <main>
        <article class="principal-article">Articulo principal</article>
        <aside class="article-aside">aside del main</aside>
    </main>
    <footer>este es el footer alv</footer>
</body>
</html>
