<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Ejerccio Odin</title>
    <link rel="shortcut icon" href="examplestyle/hongos.png" type="image/png">
    <link rel="stylesheet" href="styleForm.css">
</head>
<body>
    <header>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Minus unde totam fuga tempore mollitia nulla architecto doloremque porro nihil! Necessitatibus nihil repellat voluptate quo quia earum incidunt consequuntur officiis natus.</header>
    <aside>
        <img src="examplestyle/mos-design-7Bm7Lhets9Q-unsplash.jpg" alt="Fondo de Gundam Mecha">
        <div class="contenedorLogo">
            <img src="examplestyle/png-transparent-emblem-anime-manga-logo-anime-emblem-manga-logo.png" alt="Logo Compañia" class="logoCompania">
            <h2 class="textoCompania">COMPAÑIA</h2>
        </div>
    </aside>
    <section>
        <div class="primerDivSection">
            <fieldset>
                <legend>Let&#39;s do this</legend>

                <form id="miFormulario" action="#" method="get">

                    <div class="campo">
                        <label for="firstName">FIRST NAME</label>
                        <input type="text" name="firstName" id="firstName" placeholder="Thor">
                    </div>

                    <div class="campo">
                        <label for="lastName">LAST NAME</label>
                        <input type="text" name="lastName" id="lastName" placeholder="Doe">
                    </div>

                    <div class="campo">
                        <label for="email">EMAIL</label>
                        <input type="email" name="email" id="email" placeholder="JonDoe@example.com">
                    </div>

                    <div class="campo">   
                        <label for="phoneNumber">PHONE NUMBER</label>
                        <input type="number" name="phoneNumber" id="phoneNumber">
                    </div>

                    <div class="campo">
                        <label for="password">PASSWORD</label>
                        <input type="password" name="password" id="password">
                    </div>

                    <div class="campo">   
                        <label for="confirmPassword">CONFIRM PASSWORD</label>
                        <input type="password" name="confirmPassword" id="confirmPassword">
                    </div>

                </form>
            </fieldset>
        </div>
        <div>
            <button type="submit" form="miFormulario">Create Account</button>
            <p>Already have an account? <a href="#">Log in</a></p>
        </div>
    </section>
</body>
</html>
