<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Ejerccio Odin</title>
    <link rel="shortcut icon" href="examplestyle/hongos.png" type="image/png">
    <link rel="stylesheet" href="styleForm.css">
</head>
<body>
    <header>header</header>
    <aside>aside de la imagen</aside>
    <section>
        <div>
            <fieldset>
                <legend>Let&#39;s do this</legend>

                <form action="#" method="get"></form>

                <label for="firstName">FIRST NAME</label>
                <input type="text" name="firstName" id="firstName" placeholder="Thor">

                <label for="lastName">LAST NAME</label>
                <input type="text" name="lastName" id="lastName" placeholder="Doe">

                <label for="email">EMAIL</label>
                <input type="email" name="email" id="email" placeholder="JonDoe@example.com">

                <label for="phoneNumber">PHONE NUMBER</label>
                <input type="number" name="phoneNumber" id="phoneNumber">

                <label for="password">PASSWORD</label>
                <input type="password" name="password" id="password">

                <label for="confirmPassword">CONFIRM PASSWORD</label>
                <input type="password" name="confirmPassword" id="confirmPassword">
            </fieldset>
            <button type="submit">Create Account</button>
        </div>
        <div>
            <p>Already have an account? <a href="#">Log in</a></p>
        </div>
    </section>
</body>
</html>
