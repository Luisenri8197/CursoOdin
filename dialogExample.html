<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo Dialog</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    dialog {
      border: none;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Ejemplo de &lt;dialog&gt;</h1>
  <button id="abrir">Abrir diálogo</button>

  <dialog id="miDialogo">
    <p>¡Hola! Soy un cuadro de diálogo nativo en HTML.</p>
    <button id="cerrar">Cerrar</button>
  </dialog>

  <script>
    const dialogo = document.getElementById("miDialogo");
    const abrirBtn = document.getElementById("abrir");
    const cerrarBtn = document.getElementById("cerrar");

    abrirBtn.addEventListener("click", () => {
      dialogo.showModal(); // abre como modal
    });

    cerrarBtn.addEventListener("click", () => {
      dialogo.close(); // cierra el diálogo
    });
  </script>
</body>
</html>
